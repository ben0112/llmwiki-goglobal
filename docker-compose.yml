# LLM Wiki — 本地模式一键部署(单用户,SQLite + 文件系统,一体化镜像)。
#
#   docker compose up -d
#   open http://localhost:3000
#
# 镜像:默认拉取 Docker Hub 发布镜像 benjaminzhang/llmwiki-local
# (由 .github/workflows/docker-publish.yml 在 master 推送 / v* tag 时发布);
# 需要从源码构建时:docker compose build 或 LLMWIKI_IMAGE=llmwiki-local:dev。
#
# 工作区默认挂载 ./workspace(已被 .gitignore 忽略);换别的文件夹:
#   LLMWIKI_WORKSPACE=~/goglobal-ws docker compose up -d
#
# 多用户自部署(Postgres + MinIO 全栈)见 deploy/docker-compose.selfhost.yml。

services:
  llmwiki:
    image: ${LLMWIKI_IMAGE:-benjaminzhang/llmwiki-local:latest}
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: llmwiki
    ports:
      # 换端口:LLMWIKI_API_PORT=9100 LLMWIKI_WEB_PORT=9300 docker compose up -d
      # (PUBLIC_*_URL 会随端口变量自动对齐,浏览器/MCP 客户端才能找到服务)
      # 默认只绑定本机回环(本地单用户实例,API/MCP 无鉴权);
      # 需要局域网访问时:LLMWIKI_BIND=0.0.0.0
      # API 宿主机默认 9000(容器内固定 8000),避开本机 LLM 推理栈常占的 8000
      - "${LLMWIKI_BIND:-127.0.0.1}:${LLMWIKI_API_PORT:-9000}:8000"   # API(浏览器访问)
      - "${LLMWIKI_BIND:-127.0.0.1}:${LLMWIKI_WEB_PORT:-3000}:3000"   # Web 应用
      - "${LLMWIKI_BIND:-127.0.0.1}:${LLMWIKI_MCP_PORT:-8080}:8080"   # MCP(Streamable HTTP)
    environment:
      # 语料分类流水线(可选;设置页里配置的值优先于这些环境变量):
      #   CORPUS_LLM_BASE_URL: http://host.docker.internal:8000/v1   # OpenAI 兼容端点
      #   CORPUS_LLM_MODEL / CORPUS_LLM_API_KEY / CORPUS_LLM_CONCURRENCY
      #   CORPUS_AUTOCLASSIFY: "true"   # 自动分类(默认关)
      PUBLIC_API_URL: http://localhost:${LLMWIKI_API_PORT:-9000}
      PUBLIC_MCP_URL: http://localhost:${LLMWIKI_MCP_PORT:-8080}/mcp
      PUBLIC_WEB_URL: http://localhost:${LLMWIKI_WEB_PORT:-3000}
    volumes:
      - ${LLMWIKI_WORKSPACE:-./workspace}:/workspace
    restart: unless-stopped

  # 上游保留的开发辅助:hosted 模式开发用的裸 Postgres。
  # 默认不启动;需要时:docker compose --profile hosted-dev up -d db
  db:
    profiles: ["hosted-dev"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supavault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:

# MCP 客户端 stdio 配置(容器运行时,经 docker exec):
#   {"mcpServers": {"llmwiki": {"command": "docker",
#     "args": ["exec", "-i", "llmwiki", "/app/llmwiki", "mcp", "/workspace"]}}}
