name: Docker image (local mode)

# Builds the all-in-one local-mode image (Dockerfile.local) and pushes it to
# Docker Hub as <DOCKERHUB_USERNAME>/llmwiki-local. Pushing requires two repo
# secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — Docker Hub account / namespace
#   DOCKERHUB_TOKEN    — access token (hub.docker.com → Account Settings → Security)
# Without them the workflow still builds the image as a PR/branch check, it
# just skips the push.

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  image:
    name: Build & push llmwiki-local
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${DOCKERHUB_USERNAME:-local}/llmwiki-local"
          TAGS="$IMAGE:latest,$IMAGE:sha-${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAGS="$TAGS,$IMAGE:${GITHUB_REF#refs/tags/}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push when credentials are configured)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local
          platforms: linux/amd64,linux/arm64
          push: ${{ env.DOCKERHUB_USERNAME != '' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
