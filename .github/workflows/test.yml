name: Tests

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master, "claude/**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    name: Unit tests (no DB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r mcp/requirements.txt
          pip install -r tests/requirements.txt cryptography

      - name: Run API unit tests
        run: PYTHONPATH=api pytest tests/unit/test_chunker.py tests/unit/test_helpers.py tests/unit/test_pdf_extract.py tests/unit/test_highlight_granular.py tests/unit/test_html_parser_highlights.py tests/unit/test_s3_selfhost.py tests/unit/test_sqlite_document_repo.py tests/unit/test_wiki_regen.py tests/unit/test_archive_extract.py tests/unit/test_tus_sanitize_and_tasks.py tests/unit/test_facet_rollup.py tests/unit/test_resumable_upload.py tests/unit/test_workspace_sweep.py tests/unit/test_extraction_fixes.py -v

      - name: Run MCP unit tests
        working-directory: mcp
        run: pytest ../tests/unit/mcp/ -v

      - name: Run corpus classification tests
        run: pytest tests/unit/corpus/ -v

  mcp-integration:
    name: MCP integration tests (SQLite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP dependencies
        run: pip install -r mcp/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt cryptography

      - name: Run MCP VaultFS + tool handler tests
        working-directory: mcp
        run: pytest ../tests/integration/mcp/test_vaultfs_contract.py ../tests/integration/mcp/test_tool_handlers.py ../tests/integration/mcp/test_corpus_facets.py ../tests/integration/mcp/test_corpus_relations.py -v

  postgres-integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: supavault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Install MCP dependencies
        run: pip install -r mcp/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt cryptography

      - name: Run API isolation + lifecycle tests
        run: PYTHONPATH=api MODE=hosted pytest tests/integration/isolation/ tests/integration/test_kb_lifecycle.py tests/integration/test_note_lifecycle.py -v

      - name: Run API-key auth + hosted corpus import tests
        run: PYTHONPATH=api MODE=hosted pytest tests/integration/test_api_key_auth.py tests/integration/test_corpus_hosted_import.py tests/integration/test_corpus_hosted_pipeline.py -v

      - name: Run MCP Postgres isolation tests
        working-directory: mcp
        run: pytest ../tests/integration/mcp/test_mcp_isolation.py -v
