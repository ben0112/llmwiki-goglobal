# Self-hosted deployment of the four application services + MinIO.
#
# Prerequisites (see docs/self-hosting.md):
#   1. A self-hosted Supabase stack (Postgres + GoTrue auth behind Kong) —
#      run it from Supabase's official docker compose; it is NOT part of
#      this file. Apply supabase/migrations/ 001..009 to its database.
#   2. Copy deploy/.env.selfhost.example to deploy/.env.selfhost and fill it in.
#
# Build + run from the repository root:
#   docker compose -f deploy/docker-compose.selfhost.yml --env-file deploy/.env.selfhost up -d --build
#
# Scaling note: run exactly ONE api replica — resumable-upload state, the
# WebSocket connection manager, and graph rebuild locks are process-local.

name: llmwiki-selfhost

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API — must also be reachable by browsers (presigned URLs)
      - "9001:9001"   # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      mc admin user add local $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY} || true &&
      mc admin policy attach local readwrite --user $${AWS_ACCESS_KEY_ID} || true
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

  api:
    # 上下文必须是 api/ 子目录:api/Dockerfile 按子目录上下文编写
    # (COPY requirements.lock);hosted 运行不依赖仓库根的 corpus/shared。
    build:
      context: ../api
    environment:
      MODE: hosted
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_FORCE_PATH_STYLE: "true"
      CONVERTER_URL: http://converter:8000
      CONVERTER_SECRET: ${CONVERTER_SECRET}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      PDF_BACKEND: ${PDF_BACKEND:-opendataloader}
      GLOBAL_MAX_USERS: ${GLOBAL_MAX_USERS:-10000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STAGE: prod
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: ../mcp
    environment:
      MODE: hosted
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      MCP_URL: ${MCP_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_FORCE_PATH_STYLE: "true"
      SENTRY_DSN: ${SENTRY_DSN:-}
      STAGE: prod
      PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

  converter:
    build:
      context: ../converter
    environment:
      CONVERTER_SECRET: ${CONVERTER_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT_URL}
      PORT: "8000"
    # Internal-only: no host port. Only the api service calls it.
    restart: unless-stopped

  web:
    build:
      context: ../web
      args:
        NEXT_PUBLIC_MODE: hosted
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_MCP_URL: ${MCP_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  minio-data:
